name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
  workflow_dispatch:

jobs:
  validate-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build toolchain
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Install PlatformIO
        run: python -m pip install --upgrade pip platformio

      - name: Run host tests and firmware builds
        shell: pwsh
        env:
          KEYSWITCH_GXX: g++
        run: ./test/run_ci_checks.ps1

      - name: Upload firmware build artifacts
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: tacklebox-skr2-f429-linux-builds
          path: |
            .pio/build/skr2_f429_usb/firmware.bin
            .pio/build/skr2_f429/firmware.bin
            .pio/build/skr2_f429_usb_64k/firmware.bin
            .pio/build/skr2_f429_usb_0/firmware.bin

  validate-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PlatformIO
        run: python -m pip install --upgrade pip platformio

      - name: Setup MSYS2 toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc

      - name: Run host tests and firmware builds
        shell: pwsh
        env:
          KEYSWITCH_GXX: C:\msys64\mingw64\bin\g++.exe
        run: .\test\run_ci_checks.ps1

      - name: Upload firmware build artifacts
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: tacklebox-skr2-f429-windows-builds
          path: |
            .pio/build/skr2_f429_usb/firmware.bin
            .pio/build/skr2_f429/firmware.bin
            .pio/build/skr2_f429_usb_64k/firmware.bin
            .pio/build/skr2_f429_usb_0/firmware.bin