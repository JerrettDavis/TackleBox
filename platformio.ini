; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = skr2_f429_usb

[env]

[common_embedded]
platform = ststm32
framework = stm32cube
monitor_speed = 115200
build_src_filter =
  +<*>
  -<bootloader_*>

; Common build flags for your app.
build_flags =
  -D KEYSWITCH_TESTER
  -D HSE_VALUE=8000000U
  -D USE_HAL_DRIVER
  -I$PROJECT_PACKAGES_DIR/framework-stm32cubef4/Middlewares/ST/STM32_USB_Device_Library/Core/Inc
  -I$PROJECT_PACKAGES_DIR/framework-stm32cubef4/Middlewares/ST/STM32_USB_Device_Library/Class/CDC/Inc
  -I$PROJECT_PACKAGES_DIR/framework-stm32cubef4/Middlewares/Third_Party/FatFs/src

; For SD-card flashing, generate firmware.bin.
extra_scripts =
  post:rename_firmware.py

[env:skr2_f429]
extends = common_embedded
board = btt_skr2_f429
board_build.ldscript = STM32F429VGTx_FLASH_SKR2.ld
build_flags =
  ${common_embedded.build_flags}
  -D STM32F429xx
  -D HSE_VALUE=8000000U
  -D USE_HAL_DRIVER
  -D VECT_TAB_OFFSET=0x8000


[env:skr2_f429_usb]
extends = common_embedded
board = btt_skr2_f429_usb

board_build.ldscript = STM32F429VGTx_FLASH_SKR2.ld
board_build.offset = 0x8000
board_upload.offset_address = 0x08008000

build_flags =
  ${common_embedded.build_flags}
  -D STM32F429xx
  -D HSE_VALUE=8000000U
  -D USE_HAL_DRIVER
  -D KEYSWITCH_TESTER
  -D VECT_TAB_OFFSET=0x8000
  -D SKR2_USB_CDC
  -Wno-missing-braces

[env:skr2_f429_usb_64k]
extends = common_embedded
board = btt_skr2_f429_usb

board_build.ldscript = STM32F429VGTx_FLASH_SKR2_64k.ld
board_build.offset = 0x10000
board_upload.offset_address = 0x08010000

build_flags =
  ${common_embedded.build_flags}
  -D STM32F429xx
  -D HSE_VALUE=8000000U
  -D USE_HAL_DRIVER
  -D KEYSWITCH_TESTER
  -D VECT_TAB_OFFSET=0x10000
  -D SKR2_USB_CDC
  -Wno-missing-braces

[env:skr2_f429_usb_0]
extends = common_embedded
board = btt_skr2_f429_usb

board_build.ldscript = STM32F429VGTx_FLASH_SKR2_0.ld

build_flags =
  ${common_embedded.build_flags}
  -D STM32F429xx
  -D HSE_VALUE=8000000U
  -D USE_HAL_DRIVER
  -D KEYSWITCH_TESTER
  -D VECT_TAB_OFFSET=0x0000
  -D SKR2_USB_CDC
  -Wno-missing-braces

[env:skr2_f429_bootloader_usb]
extends = common_embedded
board = btt_skr2_f429_usb

board_build.ldscript = STM32F429VGTx_FLASH_BOOTLOADER.ld

build_src_filter =
  -<*>
  +<bootloader_main.cpp>
  +<boot_mode.cpp>
  +<bootloader_dfu_media.c>
  +<usbd_conf.c>
  +<usbd_desc.c>

build_flags =
  -D STM32F429xx
  -D HSE_VALUE=8000000U
  -D USE_HAL_DRIVER
  -D BOOTLOADER_DFU
  -D VECT_TAB_OFFSET=0x0000
  -D USBD_DFU_APP_DEFAULT_ADD=0x08008000U
  -D APP_DEFAULT_ADD=0x08008000U
  -D USBD_DFU_XFER_SIZE=1024U
  -I$PROJECT_PACKAGES_DIR/framework-stm32cubef4/Middlewares/ST/STM32_USB_Device_Library/Class/DFU/Inc
  -Wno-missing-braces

[env:skr2_f429_bootloader_cdc]
extends = common_embedded
board = btt_skr2_f429_usb

board_build.ldscript = STM32F429VGTx_FLASH_BOOTLOADER.ld

build_src_filter =
  -<*>
  +<bootloader_cdc_main.cpp>
  +<bootloader_flash.cpp>
  +<boot_panel_splash.cpp>
  +<bootloader_protocol.cpp>
  +<boot_mode.cpp>
  +<usb_cdc_bridge.c>
  +<usbd_cdc_if.c>
  +<usbd_conf.c>
  +<usbd_desc.c>

build_flags =
  -D STM32F429xx
  -D HSE_VALUE=8000000U
  -D USE_HAL_DRIVER
  -D BOOTLOADER_CDC
  -D SKR2_USB_CDC
  -D VECT_TAB_OFFSET=0x0000
  -Wno-missing-braces

